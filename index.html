<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="landing-container">

        <div class="decorations">
            <img src="src/Star 2.png" alt="Bintang" class="star star-top-right">
            <img src="src/Star 2.png" alt="Bintang" class="star star-mid-left">
            <img src="src/Star 2.png" alt="Bintang" class="star star-bottom-right-1">
            <img src="src/Star 2.png" alt="Bintang" class="star star-bottom-right-2">
            <img src="src/Star 2.png" alt="Bintang" class="star star-extra-1">
            <img src="src/Star 2.png" alt="Bintang" class="star star-extra-2">
            
            <img src="src/panah.png" alt="Kursor Panah" class="arrow">
            
            <div class="circle-deco"></div>
        </div>

        <div class="main-content">
          
            <div class="title-container">
              <div class="green-line"></div>
              <img src="src/textphotobooth.png" alt="Judul Photobooth" class="title-image">
              <img src="src/kelinci.png" alt="Kelinci Gemas" class="bunny">
            </div>

            <a href="select-frame.html" style="text-decoration: none;">
              <button id="btn-start" class="btn-start">start</button>
            </a>
            
        </div>

    </main>
    <audio id="lagu-background" loop>
        <source src="src/asap.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
